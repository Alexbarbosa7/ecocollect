<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EcoCollect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
  :root {
    --verde: #1D9E75;
    --verde-dk: #0F6E56;
    --verde-lt: #E1F5EE;
    --bg: #F7F9F7;
    --card: #FFFFFF;
    --txt: #1A1F1A;
    --txt2: #5A6A5A;
    --txt3: #9AAA9A;
    --border: #E0EAE0;
    --radius: 20px;
    --radius-sm: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Sora', sans-serif;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }

  .app-container {
    width: 100%;
    max-width: 430px;
    height: 100vh;
    max-height: 860px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,.5);
    border-radius: 40px;
    border: 10px solid #1e293b;
  }
  @media (max-width: 440px) {
    body { padding: 0; }
    .app-container { max-height: 100vh; border-radius: 0; border: none; }
  }

  .screen { display: none; width: 100%; height: 100%; position: relative; }
  .screen.active { display: block; }

  #screen-auth.active {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--bg);
    z-index: 50;
  }
  .auth-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px 24px;
    width: 100%;
  }
  .auth-logo { font-family: 'Space Mono', monospace; font-size: 24px; font-weight: 700; color: var(--verde); text-align: center; }
  .auth-sub { text-align: center; font-size: 13px; color: var(--txt2); margin: 6px 0 24px; }
  .auth-toggle { text-align: center; font-size: 13px; color: var(--txt2); margin-top: 14px; }
  .auth-toggle a { color: var(--verde-dk); font-weight: 600; cursor: pointer; }
  .auth-demo { text-align: center; font-size: 11px; color: var(--txt3); margin-top: 10px; line-height: 1.5; }
  .tipo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .tipo-btn { padding: 12px; border: 2px solid var(--border); border-radius: var(--radius-sm); text-align: center; cursor: pointer; background: #fff; font-size: 13px; font-weight: 600; }
  .tipo-btn.sel { border-color: var(--verde); background: var(--verde-lt); }

  .app-screen { width: 100%; height: 100%; position: relative; }
  .map-wrapper { position: absolute; inset: 0; z-index: 1; }
  #map-main { width: 100%; height: 100%; }
  .leaflet-container { background: #e8e6e1; font-family: 'Sora', sans-serif; }

  .app-overlay {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    pointer-events: none;
  }
  .app-overlay > * { pointer-events: auto; }

  .topbar {
    margin: 14px 14px 0;
    padding: 0 14px;
    height: 52px;
    background: rgba(255,255,255,.94);
    backdrop-filter: blur(10px);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 14px rgba(0,0,0,.06);
  }
  .logo { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; color: var(--verde); }
  .logo span { color: var(--txt); }
  .pontos-badge { font-size: 12px; font-weight: 700; background: var(--verde-lt); color: var(--verde-dk); padding: 5px 10px; border-radius: 99px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--verde); color: #fff; border: none;
    font-size: 14px; font-weight: 700; cursor: pointer;
  }

  .tabs-wrapper { margin: 10px 14px 0; }
  .tabs {
    display: flex; gap: 4px;
    background: rgba(255,255,255,.94);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px;
    box-shadow: 0 4px 14px rgba(0,0,0,.06);
  }
  .tab {
    flex: 1; text-align: center; padding: 10px 6px;
    font-size: 11px; font-weight: 600; color: var(--txt2);
    border-radius: 99px; cursor: pointer; transition: all .15s;
  }
  .tab.active { background: var(--verde); color: #fff; }

  .map-spacer { flex: 1; pointer-events: none; min-height: 60px; }

  .bottom-sheet {
    margin-top: auto;
    background: var(--card);
    border-radius: 22px 22px 0 0;
    box-shadow: 0 -10px 30px rgba(0,0,0,.12);
    max-height: 55%;
    display: flex; flex-direction: column;
    pointer-events: auto;
  }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 10px auto 0; }
  .sheet-content {
    padding: 14px 18px 22px;
    overflow-y: auto;
    flex: 1;
    -webkit-overflow-scrolling: touch;
  }
  .sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .sheet-sub { font-size: 13px; color: var(--txt2); margin-bottom: 14px; }

  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--txt2); margin-bottom: 5px; display: block; }
  .form-input {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-family: inherit; font-size: 14px; outline: none; background: #fff;
  }
  .form-input:focus { border-color: var(--verde); }

  .btn {
    display: flex; align-items: center; justify-content: center;
    padding: 14px 18px; border-radius: var(--radius-sm);
    font-family: inherit; font-size: 14px; font-weight: 600;
    border: none; cursor: pointer; width: 100%;
  }
  .btn:active { transform: scale(.98); }
  .btn-primary { background: var(--verde); color: #fff; }
  .btn-outline { background: #fff; border: 1.5px solid var(--border); color: var(--txt); margin-top: 8px; }
  .btn-danger { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
  .btn-sm { padding: 8px 14px; font-size: 12px; width: auto; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .chip {
    padding: 8px 12px; border-radius: 99px; border: 1.5px solid var(--border);
    font-size: 12px; cursor: pointer; background: #fff; color: var(--txt2);
  }
  .chip.sel { background: var(--verde-lt); border-color: var(--verde); color: var(--verde-dk); font-weight: 600; }

  .tracking-box {
    background: var(--verde-lt); border-radius: 14px;
    padding: 14px; margin-bottom: 14px;
  }
  .tracking-live { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: var(--verde-dk); margin-bottom: 6px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--verde); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  .progress-track { height: 6px; background: rgba(0,0,0,.08); border-radius: 99px; margin: 10px 0 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--verde); border-radius: 99px; transition: width .5s; }

  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
  .stat { background: #F9FAF9; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 6px; text-align: center; }
  .stat-val { font-size: 17px; font-weight: 700; font-family: 'Space Mono', monospace; }
  .stat-lbl { font-size: 10px; color: var(--txt3); }

  .sol-card {
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px; margin-bottom: 10px; background: #fff;
  }
  .sol-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .sol-mats { display: flex; flex-wrap: wrap; gap: 4px; }
  .sol-mat { font-size: 11px; background: var(--verde-lt); color: var(--verde-dk); padding: 3px 8px; border-radius: 99px; }
  .sol-badge { font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 99px; flex-shrink: 0; }
  .sol-badge.aberta { background: #FEF3C7; color: #92400E; }
  .sol-badge.aceita { background: #DBEAFE; color: #1E40AF; }
  .sol-badge.coletada { background: var(--verde-lt); color: var(--verde-dk); }
  .sol-addr { font-size: 12px; color: var(--txt2); }
  .sol-actions { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }

  .empty { text-align: center; padding: 20px 8px; color: var(--txt2); font-size: 13px; }
  .erro-msg { background: #FEE2E2; color: #991B1B; padding: 10px 12px; border-radius: var(--radius-sm); font-size: 12px; margin-bottom: 10px; display: none; }

  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: var(--txt); color: #fff; padding: 12px 20px;
    border-radius: 99px; font-size: 13px; z-index: 9999;
    opacity: 0; transition: opacity .2s; pointer-events: none; max-width: 90%;
  }
  .toast.show { opacity: 1; }

  .marker-destino { background: var(--verde); border: 3px solid #fff; border-radius: 50%; width: 14px; height: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
  .marker-coletor { font-size: 28px; filter: drop-shadow(0 2px 4px rgba(0,0,0,.3)); }
  .marker-pedido { background: #fff; border: 2px solid var(--txt); border-radius: 50%; width: 10px; height: 10px; }
</style>
</head>
<body>

<div class="app-container">

  <div id="screen-auth" class="screen active">
    <div class="auth-card">
      <div class="auth-logo">Eco<span style="color:#000">Collect</span></div>
      <div class="auth-sub">Reciclagem sob demanda</div>
      <div id="erro-auth" class="erro-msg"></div>
      <div id="form-login">
        <div class="form-group"><label class="form-label">E-mail</label><input id="login-email" class="form-input" type="email"></div>
        <div class="form-group"><label class="form-label">Senha</label><input id="login-senha" class="form-input" type="password"></div>
        <button class="btn btn-primary" onclick="fazerLogin()">Entrar</button>
        <div class="auth-demo">carlos@email.com / 123456 (gerador)<br>joao@email.com / 123456 (coletor)</div>
        <div class="auth-toggle">Não tem conta? <a onclick="trocarForm('cadastro')">Cadastre-se</a></div>
      </div>
      <div id="form-cadastro" style="display:none">
        <div class="form-group">
          <label class="form-label">Você é...</label>
          <div class="tipo-row">
            <div class="tipo-btn sel" id="tipo-gerador" onclick="selecionarTipo('gerador')">Gerador</div>
            <div class="tipo-btn" id="tipo-coletor" onclick="selecionarTipo('coletor')">Coletor</div>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Nome</label><input id="cad-nome" class="form-input"></div>
        <div class="form-group"><label class="form-label">E-mail</label><input id="cad-email" class="form-input" type="email"></div>
        <div class="form-group"><label class="form-label">Senha</label><input id="cad-senha" class="form-input" type="password"></div>
        <button class="btn btn-primary" onclick="fazerCadastro()">Criar conta</button>
        <div class="auth-toggle">Já tem conta? <a onclick="trocarForm('login')">Entrar</a></div>
      </div>
    </div>
  </div>

  <div id="screen-app" class="screen app-screen">
    <div class="map-wrapper"><div id="map-main"></div></div>
    <div class="app-overlay">
      <header class="topbar">
        <div class="logo">Eco<span>Collect</span></div>
        <span class="pontos-badge" id="badge-pontos" style="display:none">0 pts</span>
        <button class="avatar" id="btn-avatar" onclick="togglePerfil()">?</button>
      </header>
      <div class="tabs-wrapper"><div class="tabs" id="pill-tabs"></div></div>
      <div class="map-spacer"></div>
      <div class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-content" id="sheet-content"></div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API = "http://localhost:5000/api";
const JOINVILLE = [-26.3045, -48.8487];
let TOKEN = localStorage.getItem("eco_token");
let USER = null;
let abaAtiva = "";
let mostrandoPerfil = false;
let materiaisSel = [];
let cache = { abertas: [], aceitas: [], coletadas: [] };

let mapInst = null;
let rotaLayer = null, rotaFeitaLayer = null;
let markerDestino = null, markerColetor = null;
let markersPedidos = [];
let rastreioInterval = null;
let rastreioAtivoId = null;
let rastreioData = null;

const NIVEIS = [
  { nome: "Semente", medal: "🌱", min: 0, max: 500, proximo: "Broto" },
  { nome: "Broto", medal: "🌿", min: 500, max: 2000, proximo: "Árvore" },
  { nome: "Árvore", medal: "🌳", min: 2000, max: 5000, proximo: "Guardião" },
  { nome: "Guardião", medal: "⭐", min: 5000, max: 10000, proximo: "Herói Verde" },
  { nome: "Herói Verde", medal: "🏆", min: 10000, max: 10000, proximo: null },
];

function toast(msg, dur = 2500) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), dur);
}

function mostrarErro(id, msg) {
  const el = document.getElementById(id);
  if (!el) return toast(msg);
  el.textContent = msg;
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 4000);
}

async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (TOKEN) opts.headers.Authorization = "Bearer " + TOKEN;
  if (body) opts.body = JSON.stringify(body);
  let r;
  try {
    r = await fetch(API + path, opts);
  } catch {
    throw new Error(
      "Servidor offline. Execute start.ps1 ou rode: python server.py (porta 5000)"
    );
  }
  let data;
  try {
    data = await r.json();
  } catch {
    throw new Error("Resposta inválida do servidor");
  }
  if (!r.ok) throw new Error(data.erro || "Erro na requisição");
  return data;
}

function mostrarTela(nome) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-" + nome).classList.add("active");
  if (nome === "app") setTimeout(() => { initMapa(); mapInst?.invalidateSize(); }, 250);
}

// ─── Auth ──────────────────────────────────────────────────────────

function trocarForm(tipo) {
  document.getElementById("form-login").style.display = tipo === "login" ? "block" : "none";
  document.getElementById("form-cadastro").style.display = tipo === "cadastro" ? "block" : "none";
  document.getElementById("erro-auth").style.display = "none";
}

let tipoSel = "gerador";
function selecionarTipo(t) {
  tipoSel = t;
  document.getElementById("tipo-gerador").classList.toggle("sel", t === "gerador");
  document.getElementById("tipo-coletor").classList.toggle("sel", t === "coletor");
}

async function fazerLogin() {
  const email = document.getElementById("login-email").value.trim();
  const senha = document.getElementById("login-senha").value;
  if (!email || !senha) return mostrarErro("erro-auth", "Preencha e-mail e senha");
  try {
    const d = await api("POST", "/auth/login", { email, senha });
    TOKEN = d.token; USER = d.usuario;
    localStorage.setItem("eco_token", TOKEN);
    await iniciarApp();
  } catch (e) { mostrarErro("erro-auth", e.message); }
}

async function fazerCadastro() {
  const nome = document.getElementById("cad-nome").value.trim();
  const email = document.getElementById("cad-email").value.trim();
  const senha = document.getElementById("cad-senha").value;
  if (!nome || !email || !senha) return mostrarErro("erro-auth", "Preencha todos os campos");
  try {
    const d = await api("POST", "/auth/cadastro", { nome, email, senha, tipo: tipoSel });
    TOKEN = d.token; USER = d.usuario;
    localStorage.setItem("eco_token", TOKEN);
    await iniciarApp();
  } catch (e) { mostrarErro("erro-auth", e.message); }
}

function logout() {
  if (!confirm("Sair do EcoCollect?")) return;
  pararRastreio();
  localStorage.removeItem("eco_token");
  location.reload();
}

// ─── App ───────────────────────────────────────────────────────────

async function iniciarApp() {
  if (!TOKEN) return mostrarTela("auth");
  try {
    USER = await api("GET", "/auth/me");
    setupHeader();
    buildPillTabs();
    mostrarTela("app");
    initMapa();
    if (USER.tipo === "gerador") {
      await carregarDadosGerador();
      abaAtiva = cache.aceitas.length ? "coletas" : "solicitar";
    } else {
      await carregarDadosColetor();
      abaAtiva = "aceitar";
    }
    buildPillTabs();
    renderSheet();
  } catch (e) {
    localStorage.removeItem("eco_token");
    mostrarTela("auth");
  }
}

function setupHeader() {
  const badge = document.getElementById("badge-pontos");
  document.getElementById("btn-avatar").textContent = (USER.nome || "?")[0].toUpperCase();
  if (USER.tipo === "gerador") {
    badge.style.display = "inline";
    badge.textContent = USER.pontos.toLocaleString("pt-BR") + " pts";
  } else {
    badge.style.display = "none";
  }
}

function buildPillTabs() {
  const tabs = USER.tipo === "gerador"
    ? [{ id: "solicitar", label: "Solicitar Coleta" }, { id: "coletas", label: "Minhas Coletas" }]
    : [{ id: "aceitar", label: "Aceitar Coleta" }, { id: "entregas", label: "Minhas Entregas" }];
  document.getElementById("pill-tabs").innerHTML = tabs.map(t =>
    `<div class="tab${abaAtiva === t.id ? " active" : ""}" onclick="mudarAba('${t.id}')">${t.label}</div>`
  ).join("");
}

function mudarAba(aba) {
  abaAtiva = aba;
  mostrandoPerfil = false;
  buildPillTabs();
  renderSheet();
}

function togglePerfil() {
  mostrandoPerfil = !mostrandoPerfil;
  renderSheet();
}

// ─── Mapa ──────────────────────────────────────────────────────────

function initMapa() {
  if (mapInst) return;
  mapInst = L.map("map-main", { zoomControl: false, attributionControl: false }).setView(JOINVILLE, 13);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", { maxZoom: 19 }).addTo(mapInst);
  L.control.zoom({ position: "bottomright" }).addTo(mapInst);
}

function limparMarkersPedidos() {
  markersPedidos.forEach(m => mapInst.removeLayer(m));
  markersPedidos = [];
}

function limparRota() {
  [rotaLayer, rotaFeitaLayer, markerDestino, markerColetor].forEach(l => { if (l) mapInst.removeLayer(l); });
  rotaLayer = rotaFeitaLayer = markerDestino = markerColetor = null;
}

function mapaPadrao() {
  limparRota();
  limparMarkersPedidos();
  mapInst.setView(JOINVILLE, 13);
}

function mapaMarcadores(lista) {
  limparRota();
  limparMarkersPedidos();
  const pts = lista.filter(s => s.lat != null && s.lng != null);
  if (!pts.length) return mapaPadrao();
  const bounds = [];
  pts.forEach(s => {
    const m = L.marker([s.lat, s.lng], {
      icon: L.divIcon({ className: "", html: '<div class="marker-pedido"></div>', iconSize: [10, 10], iconAnchor: [5, 5] }),
    }).addTo(mapInst).bindPopup(`<b>${(s.materiais || []).join(", ")}</b><br>${s.endereco || ""}`);
    markersPedidos.push(m);
    bounds.push([s.lat, s.lng]);
  });
  mapInst.fitBounds(bounds, { padding: [90, 30, 300, 30], maxZoom: 15 });
}

function gerenciarRastreio(aceitas) {
  if (!aceitas?.length) { pararRastreio(); return; }
  if (rastreioAtivoId !== aceitas[0].id) rastreioAtivoId = aceitas[0].id;
  iniciarPollingRastreio();
  atualizarRastreioMapa();
}

function iniciarPollingRastreio() {
  if (rastreioInterval) clearInterval(rastreioInterval);
  rastreioInterval = setInterval(atualizarRastreioMapa, 2000);
}

function pararRastreio() {
  if (rastreioInterval) { clearInterval(rastreioInterval); rastreioInterval = null; }
  rastreioAtivoId = null;
  rastreioData = null;
}

async function atualizarRastreioMapa() {
  if (!rastreioAtivoId || !mapInst) return;
  try {
    const d = await api("GET", `/solicitacoes/${rastreioAtivoId}/rastreio`);
    if (!d.ativo) {
      pararRastreio();
      if (USER.tipo === "gerador") { await carregarDadosGerador(); renderSheet(); }
      return;
    }
    rastreioData = d;
    limparMarkersPedidos();
    limparRota();
    const rota = d.rota || [];
    const pos = d.coletor_pos;
    const dest = d.destino;
    const idx = Math.max(1, Math.floor((d.progresso || 0) * (rota.length - 1)));
    if (rota.length > 1) {
      rotaFeitaLayer = L.polyline(rota.slice(0, idx + 1), { color: "#545454", weight: 5 }).addTo(mapInst);
      rotaLayer = L.polyline(rota.slice(idx), { color: "#1D9E75", weight: 5, dashArray: "8 10" }).addTo(mapInst);
    }
    markerDestino = L.marker([dest.lat, dest.lng], {
      icon: L.divIcon({ className: "", html: '<div class="marker-destino"></div>', iconSize: [14, 14], iconAnchor: [7, 7] }),
    }).addTo(mapInst);
    markerColetor = L.marker([pos.lat, pos.lng], {
      icon: L.divIcon({ className: "", html: '<div class="marker-coletor">🚛</div>', iconSize: [32, 32], iconAnchor: [16, 16] }),
      zIndexOffset: 1000,
    }).addTo(mapInst);
    mapInst.fitBounds(L.latLngBounds(rota.length ? rota : [[pos.lat, pos.lng], [dest.lat, dest.lng]]), {
      padding: [90, 30, 300, 30], maxZoom: 15,
    });
    if (USER.tipo === "gerador" && abaAtiva === "coletas") renderSheet();
    if (d.chegou) toast("Coletor chegou!");
  } catch (e) { console.error(e); }
}

// ─── Dados ─────────────────────────────────────────────────────────

async function carregarDadosGerador() {
  cache.abertas = await api("GET", "/solicitacoes?status=aberta");
  cache.aceitas = await api("GET", "/solicitacoes?status=aceita");
  cache.coletadas = await api("GET", "/solicitacoes?status=coletada");
  setupHeader();
  if (cache.aceitas.length) gerenciarRastreio(cache.aceitas);
  else pararRastreio();
}

async function carregarDadosColetor() {
  cache.abertas = await api("GET", "/solicitacoes?status=aberta");
  cache.aceitas = await api("GET", "/solicitacoes?status=aceita");
}

// ─── Render sheet ──────────────────────────────────────────────────

function renderSheet() {
  const el = document.getElementById("sheet-content");
  if (mostrandoPerfil) {
    el.innerHTML = renderPerfil();
    mapaPadrao();
    return;
  }
  if (USER.tipo === "gerador") {
    if (abaAtiva === "solicitar") {
      el.innerHTML = renderSolicitar();
      mapaPadrao();
    } else {
      if (cache.aceitas.length) {
        if (!rastreioAtivoId) rastreioAtivoId = cache.aceitas[0].id;
        gerenciarRastreio(cache.aceitas);
        el.innerHTML = renderColetasAtivas();
      } else {
        pararRastreio();
        el.innerHTML = renderColetasLista();
        mapaMarcadores(cache.abertas);
      }
    }
  } else {
    if (abaAtiva === "aceitar") {
      el.innerHTML = renderColetorAceitar();
      mapaMarcadores(cache.abertas);
      pararRastreio();
    } else {
      el.innerHTML = renderColetorEntregas();
      mapaMarcadores(cache.aceitas);
      pararRastreio();
    }
  }
  setTimeout(() => mapInst?.invalidateSize(), 120);
}

function renderSolicitar() {
  return `
    <div class="sheet-title">Solicitar coleta</div>
    <div class="sheet-sub">Materiais e endereço de retirada</div>
    <div id="erro-sol" class="erro-msg"></div>
    <div class="chips">
      ${["Papelão","Plástico","Metal","Vidro","Eletrônicos","Óleo de cozinha","Pilhas/baterias","Roupas"].map(m =>
        `<div class="chip" onclick="toggleChip(this,'${m}')">${m}</div>`).join("")}
    </div>
    <div class="form-group"><label class="form-label">Endereço</label><input id="sol-endereco" class="form-input" value="${USER.endereco || ""}"></div>
    <div class="form-group"><label class="form-label">Bairro</label><input id="sol-bairro" class="form-input" placeholder="Ex: Boa Vista"></div>
    <div class="form-group"><label class="form-label">Peso (kg)</label><input id="sol-peso" class="form-input" type="number" min="0" step="0.5"></div>
    <div class="form-group"><label class="form-label">Observações</label><input id="sol-desc" class="form-input"></div>
    <button class="btn btn-primary" onclick="enviarSolicitacao()">Solicitar coleta</button>
  `;
}

function renderColetasAtivas() {
  const d = rastreioData;
  const sol = cache.aceitas.find(s => s.id === rastreioAtivoId) || cache.aceitas[0];
  const pct = d ? Math.round((d.progresso || 0) * 100) : 0;
  const nome = d?.coletor?.nome || "Coletor";
  const eta = d?.chegou ? "Chegou!" : (d ? `~${d.eta_minutos} min` : "...");
  return `
    <div class="tracking-box">
      <div class="tracking-live"><span class="live-dot"></span> COLETOR A CAMINHO</div>
      <div style="font-size:16px;font-weight:700">${nome}</div>
      <div style="font-size:13px;color:var(--verde-dk);font-weight:600;margin:4px 0">${eta}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:12px;color:var(--txt2)">${sol?.endereco || ""}</div>
    </div>
    <button class="btn btn-primary" onclick="confirmarSol(${sol?.id})">Confirmar coleta recebida</button>
    <div style="margin-top:14px">${renderColetasLista(true)}</div>
  `;
}

function renderColetasLista(somenteAtivas = false) {
  const lista = somenteAtivas
    ? [...cache.aceitas, ...cache.abertas]
    : [...cache.aceitas, ...cache.abertas, ...cache.coletadas.slice(0, 8)];
  if (!lista.length) return `<div class="empty">Nenhuma coleta ainda.</div>`;
  let html = somenteAtivas ? "" : `
    <div class="stats-row">
      <div class="stat"><div class="stat-val">${USER.total_coletas}</div><div class="stat-lbl">coletas</div></div>
      <div class="stat"><div class="stat-val">${Math.round(USER.total_kg)}</div><div class="stat-lbl">kg</div></div>
      <div class="stat"><div class="stat-val">${USER.pontos}</div><div class="stat-lbl">pts</div></div>
    </div>`;
  return html + lista.map(renderSolCard).join("");
}

function renderSolCard(s) {
  const st = { aberta: "Aguardando", aceita: "A caminho", coletada: "Concluída", cancelada: "Cancelada" }[s.status];
  let btns = "";
  if (s.status === "aberta") btns = `<button class="btn btn-danger btn-sm" onclick="cancelarSol(${s.id})">Cancelar</button>`;
  if (s.status === "aceita") btns = `<button class="btn btn-outline btn-sm" onclick="focarRastreio(${s.id})">Rastrear</button>`;
  return `
    <div class="sol-card">
      <div class="sol-header">
        <div class="sol-mats">${(s.materiais || []).map(m => `<span class="sol-mat">${m}</span>`).join("")}</div>
        <span class="sol-badge ${s.status}">${st}</span>
      </div>
      <div class="sol-addr">📍 ${s.endereco}${s.bairro ? " · " + s.bairro : ""}</div>
      ${btns ? `<div class="sol-actions">${btns}</div>` : ""}
    </div>`;
}

function renderColetorAceitar() {
  if (!cache.abertas.length) return `<div class="sheet-title">Aceitar coleta</div><div class="empty">Nenhum pedido na região.</div>`;
  return `<div class="sheet-title">Pedidos na região</div><div class="sheet-sub">${cache.abertas.length} disponível(is)</div>` +
    cache.abertas.map(s => `
      <div class="sol-card">
        <div class="sol-header"><div class="sol-mats">${(s.materiais || []).map(m => `<span class="sol-mat">${m}</span>`).join("")}</div></div>
        <div class="sol-addr">📍 ${s.endereco}</div>
        <div style="font-size:12px;color:var(--txt2);margin-top:4px">${s.gerador_nome || ""} · ~${s.peso_estimado || "?"} kg</div>
        <div class="sol-actions"><button class="btn btn-primary" onclick="aceitarColeta(${s.id})">Aceitar Coleta</button></div>
      </div>`).join("");
}

function renderColetorEntregas() {
  if (!cache.aceitas.length) return `<div class="sheet-title">Minhas entregas</div><div class="empty">Nenhuma entrega ativa.</div>`;
  return `<div class="sheet-title">Em andamento</div>` + cache.aceitas.map(s => `
    <div class="sol-card">
      <div class="sol-header"><div class="sol-mats">${(s.materiais || []).map(m => `<span class="sol-mat">${m}</span>`).join("")}</div><span class="sol-badge aceita">A caminho</span></div>
      <div class="sol-addr">📍 ${s.endereco}</div>
      <div style="font-size:12px;color:var(--txt2)">${s.gerador_nome} · ${s.gerador_tel || ""}</div>
    </div>`).join("");
}

function renderPerfil() {
  const nivel = NIVEIS.find(n => n.nome === USER.nivel) || NIVEIS[0];
  return `
    <div class="sheet-title">Perfil</div>
    <div style="text-align:center;margin-bottom:14px">${nivel.medal} <strong>${USER.nome}</strong><br><span style="font-size:12px;color:var(--txt2)">${USER.email}</span></div>
    <div class="form-group"><label class="form-label">Nome</label><input id="edit-nome" class="form-input" value="${USER.nome || ""}"></div>
    <div class="form-group"><label class="form-label">Telefone</label><input id="edit-tel" class="form-input" value="${USER.telefone || ""}"></div>
    <div class="form-group"><label class="form-label">Endereço</label><input id="edit-end" class="form-input" value="${USER.endereco || ""}"></div>
    <button class="btn btn-primary" onclick="salvarPerfil()">Salvar</button>
    <button class="btn btn-outline" onclick="togglePerfil()">Voltar</button>
    <button class="btn btn-danger" style="margin-top:8px" onclick="logout()">Sair</button>
  `;
}

// ─── Ações ─────────────────────────────────────────────────────────

function toggleChip(el, mat) {
  if (materiaisSel.includes(mat)) {
    materiaisSel = materiaisSel.filter(m => m !== mat);
    el.classList.remove("sel");
  } else {
    materiaisSel.push(mat);
    el.classList.add("sel");
  }
}

async function enviarSolicitacao() {
  if (!materiaisSel.length) return mostrarErro("erro-sol", "Selecione materiais");
  const end = document.getElementById("sol-endereco")?.value?.trim();
  if (!end) return mostrarErro("erro-sol", "Informe o endereço");
  try {
    await api("POST", "/solicitacoes", {
      materiais: materiaisSel,
      endereco: end,
      bairro: document.getElementById("sol-bairro")?.value?.trim(),
      peso_estimado: parseFloat(document.getElementById("sol-peso")?.value) || null,
      descricao: document.getElementById("sol-desc")?.value?.trim() || null,
    });
    materiaisSel = [];
    toast("Coleta solicitada!");
    abaAtiva = "coletas";
    await carregarDadosGerador();
    buildPillTabs();
    renderSheet();
  } catch (e) { mostrarErro("erro-sol", e.message); }
}

async function cancelarSol(id) {
  if (!confirm("Cancelar?")) return;
  try {
    await api("POST", `/solicitacoes/${id}/cancelar`);
    if (rastreioAtivoId === id) pararRastreio();
    toast("Cancelada.");
    await carregarDadosGerador();
    renderSheet();
  } catch (e) { toast(e.message); }
}

async function confirmarSol(id) {
  const peso = prompt("Peso coletado (kg):", "1");
  if (peso === null) return;
  try {
    const r = await api("POST", `/solicitacoes/${id}/confirmar`, { peso_real: parseFloat(peso) || 1 });
    pararRastreio();
    USER.pontos = r.total_pontos;
    USER.nivel = r.nivel;
    toast(`+${r.pontos_ganhos} pts · ${r.nivel}`);
    await carregarDadosGerador();
    setupHeader();
    renderSheet();
  } catch (e) { toast(e.message); }
}

function focarRastreio(id) {
  rastreioAtivoId = id;
  abaAtiva = "coletas";
  buildPillTabs();
  gerenciarRastreio(cache.aceitas);
  renderSheet();
}

async function aceitarColeta(id) {
  try {
    await api("POST", `/solicitacoes/${id}/aceitar`);
    toast("Coleta aceita!");
    await carregarDadosColetor();
    abaAtiva = "entregas";
    buildPillTabs();
    renderSheet();
  } catch (e) { toast(e.message); }
}

async function salvarPerfil() {
  const nome = document.getElementById("edit-nome")?.value?.trim();
  if (!nome) return toast("Nome obrigatório");
  try {
    USER = await api("PUT", "/perfil", {
      nome,
      telefone: document.getElementById("edit-tel")?.value?.trim(),
      endereco: document.getElementById("edit-end")?.value?.trim(),
    });
    setupHeader();
    toast("Perfil salvo!");
    mostrandoPerfil = false;
    renderSheet();
  } catch (e) { toast(e.message); }
}

window.addEventListener("DOMContentLoaded", iniciarApp);
</script>
</body>
</html>
